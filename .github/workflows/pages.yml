name: Deploy authoring portal to GitHub Pages

# Publishes the entire repo as the static site. Tools fetch JSON from
# `data/` and tile sprites from `assets/tiles/` and `dcss/` — all
# tracked in this repo, so we just upload the whole thing.
#
# Companion to `deanyo/botter-idle` (private game source). The
# upstream repo's `mirror-tools.yml` workflow keeps this repo's
# `data/`, `assets/tiles/`, `dcss/`, and `tools/` HTML/CSS/JS in sync
# on every push to upstream's main. So pushes here come either (a)
# directly from a maintainer hand-edit (rare), or (b) automatically
# from the mirror.

on:
  push:
    branches: [main]
  # Lets us redeploy via the Actions tab without a code change.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy if a new push lands.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
