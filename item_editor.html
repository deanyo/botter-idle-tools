<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Botter — Item Editor</title>
<link rel="stylesheet" href="portal.css">
<style id="slot-tab-style">
  /* Slot tabs across the top — reuse portal palette. */
  #slot-tabs {
    display: flex; gap: 2px; align-items: center; margin-right: 8px;
  }
  .slot-tab {
    padding: 4px 10px; font-size: 12px; cursor: pointer;
    border: 1px solid var(--border-strong);
    background: var(--bg); color: var(--muted); border-radius: 3px; font-weight: 600;
  }
  .slot-tab:hover { border-color: var(--accent-dim); color: var(--text); }
  .slot-tab.active {
    background: var(--panel-2); border-color: var(--accent-dim); color: var(--accent);
  }
  .slot-tab .slot-count { font-size: 10px; color: var(--muted); margin-left: 4px; }
  .slot-tab.active .slot-count { color: var(--accent); }
</style>
<style>
  /* Item-editor specific layout. Shared palette + form controls in
     portal.css. Tier color tags + rarity tags below remain local. */
  :root {
    --tier1: #aaaaaa;
    --tier2: #6699ff;
    --tier3: #88dd66;
    --tier4: #ffaa44;
    --tier5: #ff6655;
  }
  body {
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  #topbar {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 8px 14px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  #topbar .spacer { flex: 1; }
  /* Editor uses .active for selected toggles. */
  button.active { background: var(--panel-2); border-color: var(--accent-dim); color: var(--accent); }

  /* ---- Layout ---- */
  #body { display: flex; flex: 1; overflow: hidden; }

  #sidebar {
    width: 210px; flex-shrink: 0; background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar-head { padding: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #sidebar-head h2 { font-size: 12px; margin: 0 0 6px; color: var(--accent); }
  #type-list { flex: 1; overflow-y: auto; padding: 4px; }
  .type-item {
    padding: 5px 8px; cursor: pointer; border-radius: 3px; font-size: 12px;
    border: 1px solid transparent;
    display: flex; align-items: center; justify-content: space-between;
  }
  .type-item:hover { background: var(--panel-2); }
  .type-item.active { background: var(--panel-2); border-color: var(--accent); color: var(--accent); }
  .type-count { font-size: 10px; color: var(--muted); }

  #main-area { flex: 1; display: flex; overflow: hidden; }

  #item-grid-col {
    flex: 1; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* Tier sections */
  .tier-section { }
  .tier-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    padding: 6px 8px; background: var(--panel); border-radius: 4px;
    border-left: 3px solid var(--tier1);
  }
  .tier-header.t2 { border-color: var(--tier2); }
  .tier-header.t3 { border-color: var(--tier3); }
  .tier-header.t4 { border-color: var(--tier4); }
  .tier-header.t5 { border-color: var(--tier5); }
  .tier-header h3 { margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
  .tier-badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px;
    font-weight: 600; color: #000;
    background: var(--tier1);
  }
  .tier-badge.t2 { background: var(--tier2); }
  .tier-badge.t3 { background: var(--tier3); }
  .tier-badge.t4 { background: var(--tier4); }
  .tier-badge.t5 { background: var(--tier5); }
  .tier-note { font-size: 11px; color: var(--muted); }

  /* Item cards */
  .item-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .item-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 5px;
    padding: 8px; width: 140px; cursor: pointer; position: relative;
    transition: border-color .15s;
  }
  .item-card:hover { border-color: var(--accent); }
  .item-card.selected { border-color: var(--accent); background: var(--panel-2); }
  .item-card.dirty::after {
    content: "●"; position: absolute; top: 4px; right: 6px;
    color: var(--warn); font-size: 10px;
  }
  .item-card .sprite-wrap {
    width: 64px; height: 64px; background: var(--tile-bg);
    border: 1px solid var(--border); border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 6px;
  }
  .item-card img { width: 64px; height: 64px; image-rendering: pixelated; }
  .item-card .card-name {
    font-size: 11px; font-weight: 600; text-align: center;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-bottom: 4px;
  }
  .item-card .card-meta {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
  }
  .rarity-pill {
    font-size: 9px; padding: 1px 5px; border-radius: 8px; font-weight: 600;
    color: #000;
  }
  .rarity-common    { background: var(--rarity-common);    color: #333; }
  .rarity-uncommon  { background: var(--rarity-uncommon);  }
  .rarity-rare      { background: var(--rarity-rare);      color: #222; }
  .rarity-epic      { background: var(--rarity-epic);      }
  .rarity-legendary { background: var(--rarity-legendary); }
  .unique-badge {
    font-size: 9px; padding: 1px 4px; border-radius: 2px;
    background: #553300; color: #ffdd88; border: 1px solid #886622;
  }
  .card-stats { font-size: 10px; color: var(--muted); text-align: center; margin-bottom: 4px; }
  .card-stats span { color: var(--text); }
  .drop-bar {
    display: flex; height: 4px; border-radius: 2px; overflow: hidden; gap: 1px;
    margin-top: 4px;
  }
  .drop-bar-seg { flex: 1; height: 100%; border-radius: 1px; }
  .tag-strip { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; margin-top: 4px; }
  .flavor-tag {
    font-size: 8px; padding: 0 4px; border-radius: 6px; border: 1px solid;
    white-space: nowrap;
  }

  /* Edit panel — when an item opens, the grid hides and the editor
     gets full main-area width up to ~880px. Two-column form layout
     so the field labels + inputs sit side by side instead of
     stacking in a 340px squeeze. 2026-06-05 layout overhaul. */
  #edit-panel {
    flex: 1; background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #edit-panel.hidden { display: none; }
  /* When editor is open, the grid column collapses so the editor
     gets the full middle pane. Class added/removed by openEdit/closeEdit. */
  #main-area.editing #item-grid-col { display: none; }
  #edit-head {
    padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; gap: 8px; background: var(--panel-2);
  }
  #edit-head h2 { margin: 0; font-size: 16px; flex: 1; color: var(--accent); }
  #edit-body {
    flex: 1; overflow-y: auto; padding: 20px 28px;
    max-width: 880px; width: 100%;
  }

  .field-group {
    margin-bottom: 16px;
    background: var(--bg);
    padding: 12px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  .field-group label {
    display: block; margin-bottom: 6px; font-size: 12px; color: var(--text);
    font-weight: 600;
  }
  .field-group > label:first-child {
    color: var(--accent);
    text-transform: none;
    letter-spacing: 0;
  }
  .field-group input[type="text"] { width: 100%; padding: 6px 8px; font-size: 13px; }
  .field-group input[type="number"] { width: 84px; padding: 5px 6px; font-size: 13px; }
  .field-group textarea { font-size: 12px; min-height: 60px; padding: 8px; }
  .field-row {
    display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .field-row:last-child { margin-bottom: 0; }
  .field-row label { min-width: auto; margin-bottom: 0; font-weight: 400; color: var(--muted); }

  /* Tier buttons in edit panel */
  .tier-btn-row { display: flex; gap: 4px; }
  .tier-btn {
    flex: 1; padding: 4px 2px; font-size: 11px; font-weight: 600; text-align: center;
    border-radius: 3px; cursor: pointer; border: 1px solid var(--border);
    background: var(--bg); color: var(--muted);
  }
  .tier-btn.active { color: #000; border-color: transparent; }

  /* Weapon stat presets — same shape as tier buttons (consistent
     selector pattern across the editor: tier-btn, tag-toggle,
     preset-btn all use the same chip-on-grid style). 2026-06-05. */
  .preset-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 4px;
  }
  .preset-btn {
    padding: 6px 8px;
    font-size: 11px;
    font-weight: 600;
    text-align: left;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    transition: border-color .1s, background .1s, transform .1s;
  }
  .preset-btn:hover { border-color: var(--accent); background: var(--panel-2); transform: translateY(-1px); }
  .preset-btn .preset-stats {
    display: block;
    font-size: 10px;
    font-weight: 400;
    color: var(--muted);
    margin-top: 2px;
  }
  .tier-btn.t1.active { background: var(--tier1); }
  .tier-btn.t2.active { background: var(--tier2); }
  .tier-btn.t3.active { background: var(--tier3); }
  .tier-btn.t4.active { background: var(--tier4); }
  .tier-btn.t5.active { background: var(--tier5); }

  /* Drop weight sliders */
  .drop-weight-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .drop-weight-row label { width: 28px; text-align: right; color: var(--muted); font-size: 11px; margin-bottom: 0; }
  .drop-weight-row .dw-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .drop-weight-row input[type="range"] { flex: 1; accent-color: var(--accent); }
  .drop-weight-row .dw-val { width: 28px; font-size: 11px; text-align: right; }

  /* Flavor tag grid */
  .tag-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  /* Single chip style — used by every "click to toggle" pill in the
     editor: combat tags, enchant pool, implicit affixes. Was three
     classes (tag-toggle / tag-chip / chip) with .tag-chip never
     defined, so implicit affixes rendered as unstyled spans. Unified
     2026-06-05 — both classes resolve to the same look. */
  .tag-toggle, .tag-chip {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 11px;
    line-height: 1.4;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
    user-select: none;
    transition: border-color .1s, background .1s, color .1s;
  }
  .tag-toggle:hover, .tag-chip:hover { border-color: var(--accent); color: var(--text); }
  .tag-toggle.on, .tag-chip.on { color: #000; font-weight: 600; }

  /* Sprite preview in edit — left side carries TWO previews
     side-by-side: inventory icon (item/...) and paperdoll overlay
     (player/<slot>/...). They use different sprite trees in DCSS so
     authors need to set them independently. */
  #edit-sprite-wrap, #edit-overlay-wrap {
    width: 96px; height: 96px; background: var(--tile-bg); border: 1px solid var(--border);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  #edit-sprite-wrap img {
    width: 96px; height: 96px; image-rendering: pixelated;
  }
  /* Paperdoll preview — base sprite + overlay layered like the in-
     game widget. Both children absolute-position to the same square so
     the overlay sits on top of the base. 3× upscale on a 32×32 base. */
  #edit-overlay-wrap {
    width: 96px; height: 96px;
    overflow: hidden;
  }
  #edit-overlay-wrap .layer {
    position: absolute;
    top: 0; left: 0;
    width: 96px; height: 96px;
    image-rendering: pixelated;
    object-fit: contain;
  }
  /* Tiny corner labels so it's obvious which preview is which. */
  #edit-sprite-wrap::after, #edit-overlay-wrap::after {
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
    pointer-events: none;
  }
  #edit-sprite-wrap::after { content: "inventory"; }
  #edit-overlay-wrap::after { content: "on bot"; }
  .edit-sprite-row {
    display: flex; gap: 10px; align-items: flex-start;
    margin-bottom: 22px;  /* extra space for the corner labels */
  }
  .edit-sprite-row .right { flex: 1; }

  /* Picker modal */
  #picker { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: none; align-items: center; justify-content: center; z-index: 100; }
  #picker.open { display: flex; }
  #picker-inner { background: var(--picker-bg); border: 1px solid var(--accent); border-radius: 6px; width: 90%; max-width: 1100px; max-height: 85vh; display: flex; flex-direction: column; }
  #picker-head { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  #picker-head input { flex: 1; }
  #picker-filter { display: flex; gap: 4px; }
  #picker-grid {
    flex: 1; overflow-y: auto; padding: 14px;
    display: grid;
    /* Picker tile size — driven by --pick-size CSS variable. Default
       192px so layered paperdoll thumbs (small base + overlay) actually
       read; the previous 144px default left only ~96px of image area
       after padding + name strip, which made overlay sprites look like
       tiny rectangles. Ctrl+wheel + the +/- buttons adjust live. */
    grid-template-columns: repeat(auto-fill, minmax(var(--pick-size, 192px), 1fr));
    gap: 10px;
  }
  .pick-cell {
    background: var(--tile-bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 4px 6px; text-align: center; cursor: pointer;
    transition: border-color 0.1s, transform 0.1s, box-shadow 0.1s;
    /* Make the entire cell click-target — fixes the "selecting a
       sprite doesn't work" reports where clicks landed on padding
       gaps and missed both the image and the name label. */
    user-select: none;
    display: flex; flex-direction: column; gap: 4px;
    /* Explicit height = square image area + name strip + padding so
       grid rows don't squash the image when content count > visible
       row count. Without this, with 300+ cells in the picker the
       layout engine on some browsers compressed the row height to
       fit within the modal viewport, leaving image cells sliced to
       3-4px tall. The +28px is room for the .pick-name label. */
    min-height: calc(var(--pick-size, 192px) + 28px);
  }
  .pick-cell:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(255, 184, 77, 0.25);
    transform: translateY(-1px);
  }
  /* Picker thumbnail. The "on bot" mode renders the same paperdoll
     preview shape as the edit panel (base + overlay layered) so the
     player sees how the sprite will look on the bot, not just the
     raw 32×32 art. .pick-cell.layered uses position:relative for
     stacked .layer children. */
  .pick-cell img {
    width: 100%; aspect-ratio: 1;
    object-fit: contain; image-rendering: pixelated; background: #000;
    pointer-events: none;  /* let the cell click handler win */
    border-radius: 2px;
    /* Keep the cell square even before the image natural-dimensions
       resolve. Without min-height, lazy/erroring images collapse the
       row to ~3px tall on Firefox/WebKit grid auto-tracks. */
    min-height: var(--pick-size, 192px);
  }
  .pick-cell.layered .pick-img-wrap {
    position: relative;
    width: 100%; aspect-ratio: 1;
    background: #000; border-radius: 2px;
    /* See note above — same defensive min-height for the layered
       variant where the wrap holds two absolute-positioned images. */
    min-height: var(--pick-size, 192px);
    /* Layered paperdoll preview — checkered backdrop helps the bot
       silhouette read against varying overlay colors. */
    background-image:
      linear-gradient(45deg, #0a0a0a 25%, transparent 25%),
      linear-gradient(-45deg, #0a0a0a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #0a0a0a 75%),
      linear-gradient(-45deg, transparent 75%, #0a0a0a 75%);
    background-size: 12px 12px;
    background-position: 0 0, 0 6px, 6px -6px, -6px 0px;
    background-color: #050505;
  }
  .pick-cell.layered .pick-img-wrap .layer {
    position: absolute; inset: 0;
    image-rendering: pixelated; object-fit: contain;
    pointer-events: none;
  }
  .pick-cell .pick-name {
    font-size: 11px; color: var(--muted);
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    margin-top: 0;
    pointer-events: none;
    line-height: 1.4;
  }
  #picker-zoom {
    display: flex; align-items: center; gap: 4px;
    color: var(--muted); font-size: 11px;
  }
  #picker-zoom button {
    width: 24px; height: 24px;
    padding: 0; line-height: 1;
    font-size: 14px;
  }

  #status { padding: 8px 14px; font-size: 11px; color: var(--good); }
  #status.warn { color: var(--warn); }
</style>
</head>
<body>

<nav class="portal-nav" data-active="items" data-title="Item Editor"></nav>

<div id="topbar">
  <div id="slot-tabs"></div>
  <div id="status"></div>
  <div class="spacer"></div>
  <button onclick="addItem()">+ New item</button>
  <button onclick="forceRefreshData()" title="Bypass CDN cache and re-fetch all data files. Use after pushing a change you want to see immediately.">🔄 Refresh data</button>
  <button onclick="document.getElementById('import-file-input').click()" title="Import a previously-exported JSON file. Merges per-item: preserves fields the export doesn't carry (no schema loss when the editor's allowlist drifts).">⬆ Import</button>
  <input type="file" id="import-file-input" accept="application/json,.json" style="display:none" onchange="importJSON(event)">
  <button class="primary" onclick="exportJSON()" title="Download a JSON file with every item in this slot. Drop it into data/ to ship.">⬇ Export this slot</button>
</div>

<div id="body">
  <aside id="sidebar">
    <div id="sidebar-head">
      <h2>Base Type</h2>
      <input type="text" id="search" placeholder="Search items…" oninput="applyFilters()" style="width:100%;font-size:12px;">
    </div>
    <div id="type-list"></div>
  </aside>

  <div id="main-area">
    <div id="item-grid-col"></div>
    <div id="edit-panel" class="hidden">
      <div id="edit-head">
        <h2 id="edit-title">Edit Item</h2>
        <button onclick="exportSingleItem()" title="Download this item as JSON. Share via GitHub issue / Discord to submit it.">⬇ Save item</button>
        <button onclick="copySingleItemToClipboard()" title="Copy this item's JSON so you can paste it into a chat / issue">⧉ Copy</button>
        <button onclick="deleteItem()" style="color:#ff8888;font-size:11px;">Delete</button>
        <button onclick="closeEdit()">✕</button>
      </div>
      <div id="edit-body"></div>
    </div>
  </div>
</div>

<!-- Picker modal -->
<div id="picker">
  <div id="picker-inner">
    <div id="picker-head">
      <strong>Pick Sprite</strong>
      <div id="picker-filter">
        <!-- Rebuilt by renderPickerFilterBar() per active slot -->
      </div>
      <input type="text" id="picker-search" placeholder="filter…" oninput="renderPicker()">
      <div id="picker-zoom" title="Zoom thumbnail size (Ctrl+wheel inside the grid)">
        <button onclick="adjustPickerZoom(-32)">−</button>
        <span id="picker-zoom-val">192px</span>
        <button onclick="adjustPickerZoom(32)">+</button>
      </div>
      <button onclick="closePicker()">Close</button>
    </div>
    <div id="picker-grid" onwheel="onPickerWheel(event)"></div>
  </div>
</div>

<script>
const ATLAS_PATH    = "data/tile_atlas.json";
const AFFIXES_PATH  = "data/affixes.json";
// Item sprites are flattened into assets/tiles/items/ at
// build time (sync_items.py drops them there with the basename
// items.json's `tile` field expects). The editor preview reads from
// that path FIRST so it matches what the game actually shows.
// dcss/... still serves as a fallback for sprite-picker browsing
// of un-imported tiles.
const ITEM_TILE_BASE = "assets/tiles/items/";
const TILE_BASE      = "dcss/Dungeon Crawl Stone Soup Full/";
const TILE_BASE_SUP  = "dcss/Dungeon Crawl Stone Soup Supplemental/";

// Per-slot config: manifest path + picker root + export name + label.
// picker_roots controls which atlas paths the sprite picker offers when
// the user clicks "Browse sprites…". Listed in display order in the tab strip.
// `picker_roots` is the inventory-icon source tree (item/...).
// `overlay_roots` is the hand/body/cloak-aligned source tree
// (player/...). The two trees are separate in DCSS because the
// inventory icons are drawn diagonally for the bag, while the
// paperdoll overlays are pre-aligned to the bot's grip / body /
// head positions. See paperdoll_renderer.gd::_resolve_overlay.
const SLOTS = [
  { id:'weapon', label:'Weapons',
    // Two manifests merge into one tab — 1H swords (items_manifest.json)
    // and the rest (items_weapons_extended_manifest.json). The single
    // tab + sectioned filter chips replaces the old "1H Swords" /
    // "Weapons (extended)" split. 2026-06-05.
    manifests:['items_manifest.json','items_weapons_extended_manifest.json'],
    export_key:'items_weapons', export_file:'items_weapons.json',
    picker_roots:['item/weapon/','item/weapon/artefact/'],
    overlay_roots:['player/hand_right/','player/hand1/'],
    picker_extras:[
      { key:'swords',     label:'Swords',
        keywords:['dagger','knife','short_sword','falchion','long_sword','scimitar','rapier','katana','sabre','quickblade','ancient_sword','demon_blade','elven','orcish','cutlass'] },
      { key:'axes',       label:'Axes',
        keywords:['axe','battle_axe','war_axe','hand_axe','broad_axe','executioner_axe'] },
      { key:'maces',      label:'Maces / Flails',
        keywords:['mace','morningstar','eveningstar','flail','hammer','club','ankus'] },
      { key:'polearms',   label:'Polearms',
        keywords:['spear','halberd','bardiche','scythe','trident'] },
      { key:'2h_swords',  label:'2H Swords',
        keywords:['greatsword','claymore','double_sword','triple_sword'] },
      { key:'staves',     label:'Staves',
        keywords:['quarterstaff','lajatang','staff'] },
      { key:'exotics',    label:'Exotics',
        keywords:['bullwhip','demon_whip','whip'] },
      { key:'artefact',   label:'Artefacts', path_includes:'/artefact/' }
    ] },
  { id:'helm', label:'Helms',
    manifest:'items_helms_manifest.json',
    export_key:'items_helms', export_file:'items_helms.json',
    picker_roots:['item/armor/headgear/','item/armor/artefact/'],

// init. Used to populate the per-item affix-pool UI dynamically (no
// more hardcoded v1 affix list). Each entry has id, name, family,
// kind, stat, applies_to, tiers.
let affixesRegistry = { affixes: [], byId: {} };

// GitHub Pages serves data files via Fastly. With the cache-buster
// nonce we tried earlier, every fetch was a cache MISS that hit the
// origin — but Fastly also negative-caches 404s, so when an edge node
// briefly 404'd a path during a deploy, the cache-buster URLs pinned
// that 404 to the user's edge for ~10 minutes (different nonces all
// hashed to the same cached negative response).
//
// Default to cache-friendly URLs — the regular CDN cache serves 200s
// fast and consistently. When the user explicitly wants fresh data
// (after pushing a change), they hit the "🔄 Force refresh data"
// button which appends a one-shot nonce and bypasses both browser
// and CDN cache for the next set of fetches.
let _forceRefreshOnce = false;
function noCache(url) {
  if (!_forceRefreshOnce) return url;
  return url + (url.includes('?') ? '&' : '') + '_v=' + Date.now();
}

// Robust JSON fetch with diagnostic errors. The bare `fetch().then(r => r.json())`
// pattern hides the URL on parse failure — when GitHub Pages returns
// an HTML 404 page mid-deploy, the user just sees "JSON.parse: unexpected
// character at line 1 column 1" with no clue which file failed. Wrap so
// the error surface includes URL + HTTP status + a snippet of the body.
async function fetchJson(url) {
  const r = await fetch(noCache(url));
  const text = await r.text();
  if (!r.ok) {
    throw new Error(`${url} → HTTP ${r.status} ${r.statusText}`);
  }
  try {
    return JSON.parse(text);
  } catch (e) {
    const snippet = text.slice(0, 80).replace(/\s+/g, ' ');
    throw new Error(`${url} → not JSON (got: "${snippet}…"). Try a hard refresh (Cmd-Shift-R / Ctrl-F5).`);
  }
}

// ---------- Boot ----------
// Set of basenames that EXIST in assets/tiles/items/ (with
// optional subdir prefix for artefacts/spells). The picker filters
// its candidate list against this — picking a tile that doesn't ship
// produces a blank inventory icon at runtime, which used to be a
// silent failure mode the user only noticed in the editor preview.
//
// Schema: a Set of strings like
//   "urand_air_new.png"             (top-level)
//   "artefacts/wpn_urand_axe_of_woe.png"  (subdir)
// matching what items.json's `tile` field expects.
let shippedTiles = new Set();
// Same shape, for player overlays — keys are bare basenames since
// paperdoll_renderer.gd::_resolve_overlay strips path before looking
// in player/<slot_dir>/<stem>.png.
let shippedOverlays = {weapons: new Set(), body: new Set(), helm: new Set(),
                      shield: new Set(), boots: new Set(), gloves: new Set(),
                      cloak: new Set()};

async function init() {
  setStatus('Loading…');
  try {
    atlas = await fetchJson(ATLAS_PATH);
    // Fetch the tile-dir manifest (built by tools/build_tile_dir_
    // manifest.py — checked in). Use it to constrain the picker to
    // sprites that actually exist on disk + ship in the build.
    try {
      const tdm = await fetchJson('data/tile_dir_manifest.json');
      const top = (tdm['res://assets/tiles/items/'] || []);
      const arte = (tdm['res://assets/tiles/items/artefacts/'] || []);
      const spells = (tdm['res://assets/tiles/items/spells/'] || []);
      shippedTiles = new Set([
        ...top,
        ...arte.map(n => 'artefacts/' + n),
        ...spells.map(n => 'spells/' + n),
      ]);
      for (const sub of ['weapons','body','helm','shield','boots','gloves','cloak']) {
        const arr = tdm['res://assets/tiles/player/' + sub + '/'] || [];
        shippedOverlays[sub] = new Set(arr);
      }
    } catch (e) {
      console.warn('tile_dir_manifest.json missing — picker will show ALL atlas tiles (including unshipped):', e);
    }
    // Fetch affixes registry — drives the affix-pool UI for every item.
    try {
      const a = await fetchJson(AFFIXES_PATH);
      affixesRegistry.affixes = a.affixes || [];
      affixesRegistry.byId = {};
      for (const af of affixesRegistry.affixes) affixesRegistry.byId[af.id] = af;
    } catch (e) {
      console.warn('Could not load affixes.json:', e);
    }
    renderSlotTabs();
    await loadSlot(SLOTS[0]);
    setStatus('');
  } catch(e) {
    setStatus('Load error: '+e.message, true);
    console.error('Load error:', e);
  }
}

// Force-refresh handler — bypass CDN cache for the next round of
// fetches by appending a one-shot nonce. Resets state, drops cached
// per-slot manifests, re-runs init(). Use when you've pushed a
// change and want to see it before the 10-minute CDN TTL expires.
async function forceRefreshData() {
  _forceRefreshOnce = true;
  // Drop per-slot caches so loadSlot re-fetches from origin.
  for (const k of Object.keys(slotState)) delete slotState[k];
  allWeaponTiles = [];
  allOverlayTiles = [];
  await init();
  _forceRefreshOnce = false;
}

// Filter affixes to those whose applies_to matches the given slot.
// Family filter optional ('generic'/'class'/'archetype'). Returns
// list sorted by family then name for stable display.
function affixesForSlot(slot, family) {
  const out = [];
  for (const af of affixesRegistry.affixes) {
    const applies = af.applies_to || [];
    if (!applies.includes(slot) && !applies.includes('any')) continue;
    if (family && (af.family || 'generic') !== family) continue;
    out.push(af);
  }
  out.sort((a,b) => {
    const fa = a.family || 'generic', fb = b.family || 'generic';
    if (fa !== fb) return fa < fb ? -1 : 1;
    return (a.name||a.id) < (b.name||b.id) ? -1 : 1;
  });
  return out;
}

function renderSlotTabs() {
  const div = document.getElementById('slot-tabs');
  div.innerHTML = '';

    const el = document.createElement('div');
    el.className = 'slot-tab' + (s.id===activeSlot.id ? ' active' : '');
    el.dataset.slot = s.id;
    el.innerHTML = `${s.label}<span class="slot-count" id="slot-count-${s.id}"></span>`;
    el.onclick = () => loadSlot(s);
    div.appendChild(el);

}

function updateSlotCount(slotId, n) {
  const el = document.getElementById('slot-count-'+slotId);
  if (el) el.textContent = n != null ? '('+n+')' : '';
}

async function loadSlot(slot) {
  // Persist current state in memory before switching
  if (activeSlot && manifest && manifest.items) {
    slotState[activeSlot.id] = { manifest, items, dirty: new Set(dirty) };
  }
  activeSlot = slot;
  selectedId = null;
  activeType = '__all__';
  // The old #topbar-title was removed when the shared portal nav
  // landed — guard the lookup so a missing element doesn't blow up
  // switchSlot. The page's title chip on the nav is set via the
  // data-title attribute and doesn't need per-slot updates.
  const titleEl = document.getElementById('topbar-title');
  if (titleEl) titleEl.textContent = 'Item Editor — ' + slot.label;
  // Refresh active highlight on tabs
  document.querySelectorAll('.slot-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.slot === slot.id));
  // Reuse cached state if we've already loaded this slot
  const cached = slotState[slot.id];
  if (cached) {
    manifest = cached.manifest;
    items = cached.items;
    dirty = cached.dirty;
  } else {
    // A slot can declare either a single manifest (legacy) or a list
    // of manifests that get merged. Used by the unified Weapons tab
    // which pulls from both items_manifest.json (1H swords) and
    // items_weapons_extended_manifest.json. 2026-06-05.
    const manifestPaths = slot.manifests || (slot.manifest ? [slot.manifest] : []);
    if (manifestPaths.length === 0) {
      setStatus('Slot ' + slot.id + ' has no manifest configured', true);
      return;
    }
    try {
      const manifests = await Promise.all(manifestPaths.map(p => fetchJson(p)));
      // Merge: first manifest wins on top-level metadata (base_types,
      // flavor_tags); items[] from every manifest concatenate.
      manifest = JSON.parse(JSON.stringify(manifests[0]));
      manifest.items = manifests.flatMap(m => m.items || []);
      // Merge base_types + flavor_tags so the dropdowns include
      // entries from the secondary manifest (axes, polearms, etc.).
      for (let i = 1; i < manifests.length; i++) {
        Object.assign(manifest.base_types || {}, manifests[i].base_types || {});
        Object.assign(manifest.flavor_tags || {}, manifests[i].flavor_tags || {});
      }
      items = JSON.parse(JSON.stringify(manifest.items));
      dirty = new Set();
    } catch(e) {
      setStatus('Failed to load manifests for ' + slot.id + ': ' + e.message, true);
      return;
    }
  }
  // Reset picker state for this slot — picker_roots + overlay_roots
  // change per slot so both cached lists need to rebuild.
  allWeaponTiles = [];
  allOverlayTiles = [];
  pickerCategory = 'all';
  closeEdit();
  renderSidebar();
  renderGrid();
  updateSlotCount(slot.id, items.length);
}

function filteredItems() {
  const q = document.getElementById('search').value.toLowerCase();
  return items.filter(it => {

    if (q && !it.name.toLowerCase().includes(q) && !it.id.includes(q)) return false;
    return true;

function renderGrid() {
  const col = document.getElementById('item-grid-col');
  const visible = filteredItems();

  // Group by item_tier
  const byTier = {1:[],2:[],3:[],4:[],5:[]};
  visible.forEach(it => (byTier[it.item_tier]||byTier[5]).push(it));

  col.innerHTML = '';

      <div class="tier-header t${t}">

function makeCard(it) {
  const card = document.createElement('div');
  card.className = 'item-card' + (it.id===selectedId?' selected':'') + (dirty.has(it.id)?' dirty':'');
  card.dataset.id = it.id;

  const dw = it.drop_weights || [0,0,0,0,0];
  const maxW = Math.max(...dw, 1);
  const segs = dw.map((w,i) => {
    const pct = Math.round(w/maxW*100);
    const alpha = pct > 0 ? 0.3 + pct/100*0.7 : 0.05;
    return `<div class="drop-bar-seg" style="background:${TIER_COLORS[i+1]};opacity:${alpha}" title="T${i+1}: ${w}"></div>`;
  }).join('');

  const tags = (it.flavor_tags||[]).map(tag => {
    const info = manifest.flavor_tags?.[tag] || {};
    return `<span class="flavor-tag" style="color:${info.color||'#aaa'};border-color:${info.color||'#555'}">${tag}</span>`;
  }).join('');

  const rarityColor = RARITY_COLORS[it.rarity]||'#ccc';
  const textColor = ['common','uncommon','rare'].includes(it.rarity) ? '#000' : '#fff';

  // Apply the authored recolor (default_tint) to the card sprite via
  // CSS filter so the grid view reflects what the player will see.
  // Uses recolorPreviewStyle from the recolor section. 2026-06-05.
  const cardTintStyle = recolorPreviewStyle(it.default_tint || {});
  card.innerHTML = `
    <div class="sprite-wrap"><img style="${cardTintStyle}" src="${tileUrl(it.tile)}" onerror="if(!this.dataset.f){this.dataset.f='1';this.src='${tileUrlDcssFull(it.tile)}'}else if(!this.dataset.s){this.dataset.s='1';this.src='${tileUrlDcssSupp(it.tile)}'}else{this.src='';this.style.display='none'}"></div>
    <div class="card-name">${it.name}</div>
    <div class="card-meta">
      <span class="rarity-pill rarity-${it.rarity}" style="background:${rarityColor};color:${textColor}">${it.rarity}</span>
      ${it.unique ? '<span class="unique-badge">unique</span>' : ''}
    </div>
    <div class="card-stats">${(it.damage_min || it.damage_max) ? `Dmg <span>${it.damage_min||0}-${it.damage_max||0}</span> ${it.damage_type ? '<span style="opacity:0.7">'+it.damage_type+'</span>' : ''} ${it.speed ? '<span style="opacity:0.6">'+it.speed+'s</span>' : ''}` : ''}${it.armor ? ` Armor <span>${it.armor}</span>` : ''}${it.evasion ? ` Eva <span>${it.evasion}%</span>` : ''}</div>
    <div class="drop-bar" title="Drop weight per dungeon tier">${segs}</div>
    <div class="tag-strip">${tags}</div>
  `;
  card.onclick = () => openEdit(it.id);
  return card;
}

function tileUrl(path) {
  // The editor preview pulls from the flattened items/ dir first
  // (matches what the game renders). Sprite picker uses TILE_BASE
  // for browsing the full dcss tree — those paths get a prefix
  // there. If the items/ image 404s, the <img onerror> falls
  // through to TILE_BASE.
  return ITEM_TILE_BASE + path;
}
// Fallback used by <img onerror>. Tries dcss/Full first (most items
// live there) then dcss/Supplemental. Caller chains these with a
// nested onerror — see makeCard / renderEditBody.
function tileUrlDcssFull(path) { return TILE_BASE + path; }
function tileUrlDcssSupp(path) { return TILE_BASE_SUP + path; }

// Mirrors paperdoll_renderer.gd::SLOT_DIRS so the editor can preview
// the actual on-doll sprite. Slots without an entry (ring, amulet,
// spell) don't render on the paperdoll. 2026-06-05.
const PAPERDOLL_SLOT_DIRS = {
  weapon: 'weapons/', armor: 'body/', helm: 'helm/',
  shield: 'shield/', boots: 'boots/',
  gloves: 'gloves/', cloak: 'cloak/',
};
const PAPERDOLL_BASE = "assets/tiles/player/";
// Base bot sprite for the paperdoll preview — same one paperdoll_renderer
// uses for the in-game rig. Spriggan female default; falls back to
// the generic bot.png if absent. 2026-06-05.
const BASE_SPRITE_URL = "assets/tiles/player/spriggan_female.png";
// Resolve the paperdoll overlay sprite for an item — exact mirror of
// paperdoll_renderer.gd::_resolve_overlay. Falls back to inventory
// tile stem when no `overlay` field is set, so existing items keep
// working. Returns "" for slots without paperdoll rendering.
function overlayUrl(it) {
  const slot = it.slot;
  const dir = PAPERDOLL_SLOT_DIRS[slot];
  if (!dir) return "";
  let stem = it.overlay || (it.tile || "").replace(/\.png$/, "");
  if (!stem) return "";
  return PAPERDOLL_BASE + dir + stem + ".png";
}

// Fallback chain for missing paperdoll overlay sprites. When the
// project's player/<slot>/<stem>.png 404s, try the DCSS source trees
// (player/<dcss_subdir>/<stem>.png) so authors at least see SOMETHING
// — even if that something is the inventory icon as a stand-in.
// 2026-06-05 — handles the ~8 unrand items whose overlay isn't yet
// synced into the project.
const DCSS_OVERLAY_DIRS = {
  weapon: ['player/hand_right/', 'player/hand1/'],
  shield: ['player/hand_left/', 'player/hand2/'],
  armor:  ['player/body/'],
  helm:   ['player/head/'],
  boots:  ['player/boots/'],
  gloves: ['player/gloves/'],
  cloak:  ['player/cloak/'],
};
function overlayFallback(img, itemId) {
  const it = items.find(x => x.id === itemId);
  if (!it) {
    img.style.opacity = '0.25';
    return;
  }
  const stem = (it.overlay || (it.tile || '').replace(/\.png$/, ''));
  if (!stem) {
    img.style.opacity = '0.25';
    return;
  }
  // Cycle through DCSS source dirs for this slot, then DCSS supp,
  // then fall back to the inventory icon as a last-ditch placeholder.
  // 2026-06-05 — picker can pick a sprite that hasn't been synced
  // into project yet; the fallback walks the same trees the sprite
  // came from so the editor always shows the right pixels.
  let step = parseInt(img.dataset.fallbackStep || '0', 10);
  const dirs = DCSS_OVERLAY_DIRS[it.slot] || [];
  if (step < dirs.length) {
    img.dataset.fallbackStep = String(step + 1);
    img.src = TILE_BASE + dirs[step] + stem + '.png';
    return;
  }
  // Try DCSS Supplemental tree at the dir for this slot.
  if (!img.dataset.suppTried) {
    img.dataset.suppTried = '1';
    if (dirs.length > 0) {
      img.src = TILE_BASE_SUP + dirs[0] + stem + '.png';
      return;
    }
  }
  // Final fallback: the inventory icon (so the user sees SOMETHING).
  if (!img.dataset.invFallback) {
    img.dataset.invFallback = '1';
    img.src = tileUrl(it.tile);
    img.title = 'No paperdoll sprite found — showing inventory icon as placeholder. Run tools/sync_items.py to copy DCSS source into the project.';
    img.style.opacity = '0.55';
    return;
  }
  img.style.opacity = '0.25';
  img.title = 'No paperdoll sprite available for this item.';
}

// ---------- Edit panel ----------
function openEdit(id) {
  selectedId = id;
  const it = items.find(x=>x.id===id);
  if (!it) return;
  // Switch the layout into editing mode — collapses the card grid so
  // the edit panel gets the full middle pane (was 340px squeezed
  // alongside the grid). 2026-06-05.
  document.getElementById('main-area').classList.add('editing');
  document.getElementById('edit-panel').classList.remove('hidden');
  document.getElementById('edit-title').textContent = it.name;
  renderEditBody(it);
}

function closeEdit() {
  selectedId = null;
  document.getElementById('main-area').classList.remove('editing');
  document.getElementById('edit-panel').classList.add('hidden');
  renderGrid();
}

function renderEditBody(it) {
  const body = document.getElementById('edit-body');
  const flavorKeys = Object.keys(manifest.flavor_tags||{});
  const tierBtns = [1,2,3,4,5].map(t =>
    `<button class="tier-btn t${t}${it.item_tier===t?' active':''}" onclick="setField('${it.id}','item_tier',${t});renderEditBody(items.find(x=>x.id==='${it.id}'))">T${t}</button>`
  ).join('');
  const rarityOpts = RARITIES.map(r =>
    `<option value="${r}"${it.rarity===r?' selected':''}>${r}</option>`
  ).join('');
  const baseTypeOpts = Object.keys(manifest.base_types||{}).map(t =>
    `<option value="${t}"${it.base_type===t?' selected':''}>${manifest.base_types[t].label}</option>`
  ).join('');

  const dwRows = [1,2,3,4,5].map(t => {
    const w = it.drop_weights[t-1]||0;
    return `<div class="drop-weight-row">
      <span class="dw-dot" style="background:${TIER_COLORS[t]}"></span>
      <label>T${t}</label>
      <input type="range" min="0" max="100" value="${w}" oninput="setDW('${it.id}',${t-1},this.value);this.nextElementSibling.textContent=this.value">
      <span class="dw-val">${w}</span>
    </div>`;
  }).join('');

  const tagGrid = flavorKeys.map(tag => {
    const on = (it.flavor_tags||[]).includes(tag);
    const info = manifest.flavor_tags[tag];
    return `<button class="tag-toggle${on?' on':''}" style="${on?'background:'+info.color+';color:#000;border-color:'+info.color:''}"
      onclick="toggleTag('${it.id}','${tag}')" title="${info.desc}">${tag}</button>`;
  }).join('');
  // Same tag toggles, but bound to it.enchant_pool — selects which
  // flavors are eligible to be rolled on a drop. Empty pool = any
  // flavor allowed (matches dungeon._create_item_instance fallback).
  const enchantPoolGrid = flavorKeys.map(tag => {
    const on = (it.enchant_pool||[]).includes(tag);
    const info = manifest.flavor_tags[tag];
    return `<button class="tag-toggle${on?' on':''}" style="${on?'background:'+info.color+';color:#000;border-color:'+info.color:''}"
      onclick="toggleEnchantPool('${it.id}','${tag}')" title="${info.desc}">${tag}</button>`;
  }).join('');

  // Affix pool override — dynamic from affixes.json (item-overhaul v2).
  // Filtered to only affixes whose applies_to covers this item's slot.
  // Each row gets a slider + the affix's stat color chip + family tag.
  // When any value > 0, this dict replaces the global pool. All zero =
  // ignore (no rolls — the item drops with no affixes).
  const ap = it.affix_pool || {};
  const slotAffixes = affixesForSlot(it.slot);
  let lastFamily = '';
  const affixPoolRows = slotAffixes.map(af => {
    const w = ap[af.id] || 0;
    const fam = af.family || 'generic';
    let header = '';
    if (fam !== lastFamily) {
      const famLabel = fam.charAt(0).toUpperCase() + fam.slice(1);
      header = `<div style="grid-column:1/-1;margin-top:8px;font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:0.05em">${famLabel} affixes</div>`;
      lastFamily = fam;

    const swatch = `<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${affixColorFor(af.stat)};margin-right:6px;vertical-align:middle"></span>`;
    return `${header}<div class="drop-weight-row">
      <label style="min-width:130px">${swatch}${af.name||af.id}</label>
      <input type="range" min="0" max="100" value="${w}" oninput="setAffixPool('${it.id}','${af.id}',+this.value);this.nextElementSibling.textContent=this.value">
      <span class="dw-val">${w}</span>
    </div>`;
  }).join('');

  // Implicit affixes — chip picker driven by affixesRegistry. Click
  // toggles. Filtered to affixes that apply to this slot AND aren't
  // archetype-flag types unless this is a spell tome.
  const implicits = it.implicit_affixes || [];
  const implicitChips = slotAffixes
    .filter(af => (af.family || 'generic') !== 'archetype' || it.slot === 'spell')
    .map(af => {
      const on = implicits.includes(af.id);
      const color = affixColorFor(af.stat);
      const onStyle = on ? `background:${color};color:#000;border-color:${color}` : `border-color:${color}`;
      return `<button class="tag-toggle${on?' on':''}" data-implicit="${af.id}" style="${onStyle}" onclick="toggleImplicit('${it.id}','${af.id}')" title="${(af.desc||'').replace(/"/g,'&quot;')}">${af.name||af.id}</button>`;
    }).join('');

  body.innerHTML = `
    <div class="edit-sprite-row">
      <div id="edit-sprite-wrap" title="Inventory icon (the diagonal sprite the player sees in the bag)">
        <img id="edit-sprite-img" style="${recolorPreviewStyle(it.default_tint || {})}" src="${tileUrl(it.tile)}" onerror="if(!this.dataset.f){this.dataset.f='1';this.src='${tileUrlDcssFull(it.tile)}'}else if(!this.dataset.s){this.dataset.s='1';this.src='${tileUrlDcssSupp(it.tile)}'}else{this.src='';this.style.display='none'}">
      </div>
      ${PAPERDOLL_SLOT_DIRS[it.slot] ? `
        <div id="edit-overlay-wrap" title="Paperdoll sprite (how this item looks held / worn on the bot)">
          <img class="layer" id="edit-overlay-base" src="${BASE_SPRITE_URL}" alt="">
          <img class="layer" id="edit-overlay-img" style="${recolorPreviewStyle(it.default_tint_overlay || it.default_tint || {})}" src="${overlayUrl(it)}"
               onerror="overlayFallback(this, '${it.id}')">
        </div>
      ` : ''}
      <div class="right">
        <div class="field-group">
          <label>Inventory icon (sprite filename)</label>
          <input type="text" style="width:100%;font-size:11px" value="${it.tile}" id="tile-path-input"
            onchange="setField('${it.id}','tile',this.value);refreshSpritePreviews('${it.id}')">
          <div style="font-size:10px;color:var(--muted);margin-top:2px">The diagonal sprite shown in the bag + on the floor when dropped.</div>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:8px">
          <button onclick="openPicker('${it.id}','inventory')">Browse inventory icons…</button>
        </div>
        ${PAPERDOLL_SLOT_DIRS[it.slot] ? `
          <div class="field-group">
            <label>Paperdoll sprite (overlay)</label>

            <div style="font-size:10px;color:var(--muted);margin-top:2px">How the item renders held / worn on the bot. Leave blank to reuse the inventory filename.</div>
          </div>
          <div style="display:flex;gap:6px">
            <button onclick="openPicker('${it.id}','overlay')">Browse paperdoll sprites…</button>
            <button onclick="clearOverlay('${it.id}')" class="subtle" title="Clear the override and fall back to the inventory filename">Clear</button>
          </div>
        ` : ''}
      </div>
    </div>

    <div class="field-group">
      <label>Display name</label>

    <div class="field-group">

// Recolor controls — reads/writes a tint dict on the item. `surface` is
// 'inventory' (default — writes it.default_tint) or 'overlay' (writes
// it.default_tint_overlay, only renders for paperdoll-slotted items).
// Mirrors the live game shader (item_recolor.gdshader) — same modes +
// ranges.
function recolorSection(it, surface) {
  surface = surface || 'inventory';
  const tintKey = surface === 'overlay' ? 'default_tint_overlay' : 'default_tint';
  const previewIdSuffix = surface === 'overlay' ? '-overlay' : '';
  const t = it[tintKey] || {};
  const mode = t.mode || 'none';
  const hue = (t.hue == null) ? 0 : Math.round(t.hue);
  const sat = (t.sat == null) ? 1.0 : t.sat;
  const modes = [
    ['none',      'None — random per drop'],
    ['normal',    'Solid hue (works on colorful sprites)'],
    ['colorize',  'Colorize (paints white/grey sprites)'],
    ['shimmer',   'Shimmer — animated highlight sweep'],
    ['inverted',  'Inverted — colors swapped'],
    ['prismatic', 'Prismatic — hue cycles in real time'],
  ];
  const opts = modes.map(([v,lbl]) => `<option value="${v}" ${v===mode?'selected':''}>${lbl}</option>`).join('');
  let html = `
    <div class="field-row">
      <span style="font-size:11px;color:var(--muted)">Effect</span>
      <select onchange="setRecolorMode('${it.id}',this.value,'${tintKey}')">${opts}</select>
    </div>`;
  if (mode !== 'none') {
    // Preview source: inventory tile by default; for the overlay
    // surface, render the bot base layered with the overlay sprite
    // (same shape as the edit-panel paperdoll preview) so the author
    // sees the recolor in the real on-character context. Falls back
    // to the inventory tile when no overlay is resolvable.
    let previewBlock;
    if (surface === 'overlay') {
      const overlaySrc = overlayUrl(it);
      previewBlock = `
        <div style="display:inline-block;width:96px;height:96px;background:#000;border:1px solid var(--border-strong);border-radius:3px;position:relative">
          <img src="${BASE_SPRITE_URL}" style="position:absolute;inset:0;width:96px;height:96px;image-rendering:pixelated">
          <img id="recolor-preview${previewIdSuffix}-${it.id}" src="${overlaySrc}"
               style="position:absolute;inset:0;width:96px;height:96px;image-rendering:pixelated;${recolorPreviewStyle(t)}">
        </div>`;
    } else {
      previewBlock = `
        <div style="display:inline-block;width:96px;height:96px;background:#000;border:1px solid var(--border-strong);border-radius:3px;position:relative">
          <img id="recolor-preview${previewIdSuffix}-${it.id}" src="${tileUrl(it.tile)}"
               style="width:96px;height:96px;image-rendering:pixelated;${recolorPreviewStyle(t)}"
               onerror="if(!this.dataset.f){this.dataset.f='1';this.src='${tileUrlDcssFull(it.tile)}'}else if(!this.dataset.s){this.dataset.s='1';this.src='${tileUrlDcssSupp(it.tile)}'}">
        </div>`;
    }
    html += `
      <div class="field-row">
        <span style="font-size:11px;color:var(--muted)">Hue</span>
        <input type="range" min="0" max="360" step="5" value="${hue}"
          oninput="setRecolorField('${it.id}','hue',+this.value,'${tintKey}');this.nextElementSibling.textContent=this.value+'°'">
        <span style="min-width:42px;text-align:right;font-variant-numeric:tabular-nums">${hue}°</span>
      </div>
      <div class="field-row">
        <span style="font-size:11px;color:var(--muted)">Saturation</span>
        <input type="range" min="0" max="2" step="0.05" value="${sat}"
          oninput="setRecolorField('${it.id}','sat',+this.value,'${tintKey}');this.nextElementSibling.textContent=this.value">
        <span style="min-width:42px;text-align:right;font-variant-numeric:tabular-nums">${sat}</span>
      </div>
      <div style="margin-top:6px">
        ${previewBlock}
        <div style="font-size:10px;color:var(--muted);margin-top:4px;display:inline-block;vertical-align:top;margin-left:8px;max-width:240px">
          Preview is a CSS-filter approximation — the in-game shader may render slightly differently, especially on darker palettes.
        </div>
      </div>`;
  }
  return html;
}

// CSS-filter approximation of the live game shader for the editor
// preview. Not pixel-perfect (CSS filter chains aren't HSV), but close
// enough to pick a hue + saturation that lands in the right ballpark.
function recolorPreviewStyle(t) {
  if (!t || !t.mode || t.mode === 'none') return '';
  const hue = t.hue || 0;
  const sat = (t.sat == null) ? 1 : t.sat;
  // Colorize mode is hard to approximate with CSS filters alone
  // (hue-rotate is a no-op on white). Use a sepia → hue-rotate
  // chain instead — sepia first paints the sprite warm-orange,
  // then hue-rotate sweeps to the requested target. Crude vs the
  // GLSL shader but close enough for editor preview.
  if (t.mode === 'colorize') {
    // sepia = 1 produces RGB ≈ (~0.7, ~0.5, ~0.3); hue-rotate then
    // sweeps that anchor color around the wheel. Add saturation
    // multiplier so the colorize strength reads roughly right.
    const offset = ((hue - 30 + 360) % 360);  // sepia base sits ~30°
    return `filter: sepia(1) saturate(${(sat * 1.6).toFixed(2)}) hue-rotate(${offset}deg) brightness(1.0)`;
  }
  const filters = [`hue-rotate(${hue}deg)`, `saturate(${sat})`];
  if (t.mode === 'inverted') filters.push('invert(1)');
  if (t.mode === 'shimmer') filters.push('brightness(1.15)');
  return 'filter:' + filters.join(' ');
}

function setRecolorMode(id, mode, tintKey) {
  tintKey = tintKey || 'default_tint';
  const it = items.find(x => x.id === id);
  if (!it) return;
  if (mode === 'none') {
    delete it[tintKey];
  } else {
    if (!it[tintKey]) it[tintKey] = {hue: 0, sat: 1.0};
    it[tintKey].mode = mode;
  }
  dirty.add(id);
  renderEditBody(it);
}

function setRecolorField(id, key, val, tintKey) {
  tintKey = tintKey || 'default_tint';
  const it = items.find(x => x.id === id);
  if (!it || !it[tintKey]) return;
  it[tintKey][key] = val;
  dirty.add(id);
  // Live-update the preview filters without a full panel rebuild so
  // slider drags stay smooth. Each tint surface drives different DOM:
  //   default_tint          → inventory sprite + card thumb + recolor
  //                           preview thumb under inventory sliders.
  //                           Also drives the on-character overlay
  //                           UNLESS the item authors a separate
  //                           default_tint_overlay (then overlay
  //                           reads from that instead — runtime
  //                           recolor_material_for_overlay logic).
  //   default_tint_overlay  → on-character overlay sprite + recolor
  //                           preview thumb under overlay sliders.
  const styleSuffix = recolorPreviewStyle(it[tintKey]);
  const previewSuffix = tintKey === 'default_tint_overlay' ? '-overlay' : '';
  const previewImg = document.getElementById('recolor-preview' + previewSuffix + '-' + id);
  if (previewImg) {
    // Overlay preview is layered (absolute-positioned over base
    // sprite); inventory preview is a single image filling the box.
    if (tintKey === 'default_tint_overlay') {
      previewImg.style.cssText = 'position:absolute;inset:0;width:96px;height:96px;image-rendering:pixelated;' + styleSuffix;
    } else {
      previewImg.style.cssText = 'width:96px;height:96px;image-rendering:pixelated;' + styleSuffix;
    }
  }
  if (tintKey === 'default_tint') {
    // Inventory tint drives both the inventory icon and (via
    // fallback) the on-character overlay when no overlay-specific
    // tint is authored.
    const editImg = document.getElementById('edit-sprite-img');
    if (editImg) editImg.style.cssText = styleSuffix;
    if (!it.default_tint_overlay) {
      const overlayImg = document.getElementById('edit-overlay-img');
      if (overlayImg) overlayImg.style.cssText = styleSuffix;
    }
    const cardImg = document.querySelector(`[data-id="${id}"] .sprite-wrap img`);
    if (cardImg) cardImg.style.cssText = styleSuffix;
  } else {
    // Overlay-specific tint — only updates the on-character preview.
    const overlayImg = document.getElementById('edit-overlay-img');
    if (overlayImg) overlayImg.style.cssText = styleSuffix;
  }
}

function applyEdit() {
  setStatus('Changes staged — use Export to write items.json.');
  setTimeout(() => setStatus(''), 2000);
}

// ---------- Field mutations ----------
function setField(id, key, val) {
  const it = items.find(x=>x.id===id);
  if (!it) return;
  it[key] = val;
  dirty.add(id);
  updateCard(id);
}
