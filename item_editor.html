function weaponPresetButtons(it) {
  return WEAPON_PRESETS.map((p, idx) => `
    <button class="preset-btn" onclick="applyWeaponPreset('${it.id}', ${idx})"
      title="${p.dmg_min}-${p.dmg_max} dmg · ${p.speed}s · ${p.weapon_class} · T${p.item_tier} · ${p.rarity}">
      ${p.label}
      <span class="preset-stats">${p.dmg_min}–${p.dmg_max} · ${p.speed}s · ${p.weapon_class}</span>
    </button>
  `).join('');
}

function applyWeaponPreset(id, presetIdx) {
  const it = items.find(x => x.id === id);
  const p = WEAPON_PRESETS[presetIdx];
  if (!it || !p) return;
  it.damage_min = p.dmg_min;
  it.damage_max = p.dmg_max;
  it.speed = p.speed;
  it.weapon_class = p.weapon_class;
  it.item_tier = p.item_tier;
  it.rarity = p.rarity;
  // Steer drop_weights toward the preset's tier so the new item shows
  // up at sensible floors. Single-tier-100 — author can broaden later.
  const dw = [0, 0, 0, 0, 0];
  dw[p.item_tier - 1] = 100;
  it.drop_weights = dw;
  dirty.add(id);
  updateCard(id);
  renderEditBody(it);
}
function setDW(id, idx, val) {
  const it = items.find(x=>x.id===id);
  if (!it) return;
  it.drop_weights[idx] = +val;
  dirty.add(id);
  updateCard(id);
}
function toggleTag(id, tag) {
  const it = items.find(x=>x.id===id);
  if (!it) return;
  if (!it.flavor_tags) it.flavor_tags=[];
  const i = it.flavor_tags.indexOf(tag);
  if (i>=0) it.flavor_tags.splice(i,1); else it.flavor_tags.push(tag);
  dirty.add(id);
  updateCard(id);
  renderEditBody(it);
}

// Implicit affix chip toggle. implicit_affixes is the always-present
// affix list — stamped on every drop in addition to rolled affixes.
// Used for uniques (e.g. Vampire's Tooth → ['of_lifesteal']).
function toggleImplicit(id, affixId) {
  const it = items.find(x=>x.id===id);
  if (!it) return;
  if (!it.implicit_affixes) it.implicit_affixes = [];
  const i = it.implicit_affixes.indexOf(affixId);
  if (i>=0) it.implicit_affixes.splice(i,1);
  else it.implicit_affixes.push(affixId);
  dirty.add(id);
  renderEditBody(it);
}

// Per-item enchant pool toggle. enchant_pool is the allowlist of
// flavors that can roll on a drop when enchant_chance fires.
function toggleEnchantPool(id, tag) {
  const it = items.find(x=>x.id===id);
  if (!it) return;
  if (!it.enchant_pool) it.enchant_pool=[];
  const i = it.enchant_pool.indexOf(tag);
  if (i>=0) it.enchant_pool.splice(i,1); else it.enchant_pool.push(tag);
  dirty.add(id);
  renderEditBody(it);
}

// Per-item affix_pool weight setter. When any weight > 0, the dict
// replaces the base_type/global pool at roll time. Setting all
// weights back to 0 deletes the field so the item inherits defaults.
function setAffixPool(id, affixId, weight) {
  const it = items.find(x=>x.id===id);
  if (!it) return;
  if (!it.affix_pool) it.affix_pool = {};
  if (weight > 0) {
    it.affix_pool[affixId] = weight;
  } else {
    delete it.affix_pool[affixId];
  }
  if (Object.keys(it.affix_pool).length === 0) delete it.affix_pool;
  dirty.add(id);
}
function updateCard(id) {
  const it = items.find(x=>x.id===id);
  if (!it) return;
  const oldCard = document.querySelector(`.item-card[data-id="${id}"]`);
  if (oldCard) {
    const newCard = makeCard(it);
    oldCard.replaceWith(newCard);
  }
}

function addItem() {
  const id = 'new_'+activeSlot.id+'_' + Date.now();
  // Pull a sensible default from the manifest's first item so per-slot
  // defaults (sprite, base_type, atk/def/hp shape) come along for the ride.
  const tplSrc = items[0] || {};
  const tpl = {
    id,
    name: 'New ' + activeSlot.label.replace(/s$/,''),
    slot: activeSlot.id,
    base_type: tplSrc.base_type || Object.keys(manifest.base_types || {})[0] || '',
    item_tier: 3,
    rarity: 'rare',
    tile: tplSrc.tile || '',
    atk: 0, def: 0, hp: 0,
    flavor_tags: [], lore: '',
    drop_weights: [0, 0, 100, 0, 0],
    unique: false
  };
  // Weapon-slot defaults — start from the "Rare Sword" preset so a
  // brand-new weapon already has playable damage numbers instead of
  // 0/0/0. Author hits "+ New item", picks a preset to refine, then
  // tweaks. Saves a hand-math round.
  if (activeSlot.id === 'weapon') {
    const seed = WEAPON_PRESETS.find(p => p.label === 'Rare Sword') || WEAPON_PRESETS[0];
    tpl.damage_min = seed.dmg_min;
    tpl.damage_max = seed.dmg_max;
    tpl.damage_type = 'physical';
    tpl.speed = seed.speed;
    tpl.weapon_class = seed.weapon_class;
    tpl.item_tier = seed.item_tier;
    tpl.rarity = seed.rarity;
    tpl.enchant_chance = 0.10;
  }
  items.push(tpl);
  dirty.add(id);
  updateSlotCount(activeSlot.id, items.length);
  renderSidebar();
  renderGrid();
  openEdit(id);
}

function deleteItem() {
  if (!selectedId) return;
  if (!confirm('Delete '+selectedId+'?')) return;
  items = items.filter(x=>x.id!==selectedId);
  dirty.delete(selectedId);
  selectedId = null;
  closeEdit();
  renderSidebar();
  renderGrid();
  updateSlotCount(activeSlot.id, items.length);
}

// ---------- Sprite picker ----------
// pickerMode is "inventory" (default — sets it.tile from item/...
// trees) or "overlay" (sets it.overlay from player/... trees). The
// two trees are visually different in DCSS, so authors choose them
// independently. 2026-06-05.
let pickerItemId = null;
let pickerMode = 'inventory';
let allWeaponTiles = [];
let allOverlayTiles = [];

// Stems we know are generic positional weapon/gear sprites — i.e.
// drawn aligned to a hand/body/head canvas position, suitable for any
// item of the right shape. DCSS's player/hand_right tree mixes these
// with character-named one-off sprites (aragorn, frodo, gandalf,
// enchantress_dagger) and ranged-weapon poses (bow, crossbow, dart,
// blowgun) that should NEVER appear as picker options for melee items.
//
// We filter the overlay list down to entries whose basename starts
// with one of these prefixes. Per-character art still ships in the
// project for the items that actually use them, but never appears as
// a candidate for a fresh authoring choice. 2026-06-05.
const GENERIC_OVERLAY_PREFIXES = {
  // Melee weapons (player/hand_right)
  weapon: [
    'dagger', 'knife', 'short_sword', 'long_sword', 'falchion',
    'rapier', 'scimitar', 'sabre', 'cutlass', 'katana', 'broadsword',
    'demonblade', 'demon_blade', 'heavy_sword', 'great_sword',
    'greatsword', 'claymore', 'double_sword', 'triple_sword',
    'mace', 'morningstar', 'eveningstar', 'flail', 'hammer',
    'club', 'giant_club', 'great_mace', 'large_mace', 'rod_hammer',
    'axe', 'battleaxe', 'broad_axe', 'hand_axe', 'war_axe',
    'spear', 'halberd', 'bardiche', 'glaive', 'trident', 'fork',
    'scythe', 'lance', 'pole',
    'quarterstaff', 'staff', 'lajatang',
    'whip',
  ],
  // Off-hand sprites for shields (player/hand_left) — DCSS ships
  // lshield_*, buckler_*, plus a few named exceptions we want to allow.
  shield: [
    'buckler', 'lshield', 'shield_kite', 'shield_round', 'shield_diamond',
    'shield_holy', 'shield_dd', 'shield_donald', 'shield_goblin',
    'shield_draconic', 'gong', 'bullseye',
  ],
  // Body torsos (player/body) — exclude full-figure dragon armor variants
  // we DON'T want and accept the named common-shape items.
  armor: [
    'jacket', 'chainmail', 'scalemail', 'half_plate', 'plate',
    'bplate', 'leather_jacket', 'robe', 'shoulder_pad',
    'dragon_armor', 'dragon_scale', 'crystal_plate', 'green_chain',
    'lears_chain', 'plate_and_cloth', 'deep_troll', 'iron_plate',
  ],
  helm: [
    'cap', 'hat', 'helm', 'fhelm', 'hood', 'crown', 'cone',
    'feather', 'horn', 'turban', 'plume', 'visor', 'mask',
    'bandana', 'helmet', 'full_', 'mitre',
  ],
  boots: [
    'long', 'short', 'middle', 'mesh', 'pj', 'spider',
    'slippers', 'hooves', 'seven_league',
  ],
  gloves: [
    'glove', 'gauntlet', 'mitten', 'claws',
  ],
  cloak: [
    'black', 'blue', 'brown', 'cyan', 'gray', 'green',
    'magenta', 'red', 'white', 'yellow', 'dragonskin',
    'ratskin', 'scarf',
  ],
};

function _isGenericOverlay(slotId, basename) {
  const prefixes = GENERIC_OVERLAY_PREFIXES[slotId] || [];
  if (prefixes.length === 0) return true;  // unknown slot — pass everything
  for (const p of prefixes) {
    if (basename.startsWith(p)) return true;
  }
  return false;
}

// Resolve the basename a picked atlas key would store on the item.
// Mirrors the on-disk layout under assets/tiles/items/:
//   - artefact subfolder -> "artefacts/wpn_<stem>.png" or "artefacts/<stem>.png"
//   - spell subfolder -> "spells/<stem>.png"
//   - everything else -> "<stem>.png"
// Returns null when no shipped file matches the atlas key. Lets the
// picker hide tiles that would render blank at runtime.
function shippedBasenameForAtlasKey(atlasKey) {
  const stem = atlasKey.split('/').pop();          // e.g. "urand_axe_of_woe.png"
  const isArtefact = atlasKey.includes('/artefact/');
  const isSpell = atlasKey.includes('/spells/') || atlasKey.includes('/spell/');
  // Try direct stem at top level first (the common case).
  if (shippedTiles.has(stem)) return stem;
  // Artefact: try "artefacts/<stem>" and "artefacts/wpn_<stem>" /
  // "artefacts/arm_<stem>" — sync_items.py historically prefixed
  // weapons with `wpn_` and armor with `arm_` when copying into the
  // artefacts subdir.
  if (isArtefact) {
    if (shippedTiles.has('artefacts/' + stem)) return 'artefacts/' + stem;
    const withWpn = 'artefacts/wpn_' + stem;
    if (shippedTiles.has(withWpn)) return withWpn;
    const withArm = 'artefacts/arm_' + stem;
    if (shippedTiles.has(withArm)) return withArm;
  }
  if (isSpell && shippedTiles.has('spells/' + stem)) return 'spells/' + stem;
  return null;
}

function buildWeaponTileList() {
  // Pull all atlas paths under any of the active slot's picker_roots
  // (inventory icons) and overlay_roots (paperdoll overlays). Both
  // lists rebuild when activeSlot changes via switchSlot.
  //
  // Inventory tiles are filtered to ones that EXIST in
  // assets/tiles/items/ — picks that resolve to a missing file
  // render as blank icons at runtime, which used to be a silent
  // failure mode. shippedTiles is loaded from tile_dir_manifest.json
  // at boot.
  //
  // Overlay list is filtered to GENERIC positional sprites — strips
  // out character-named one-offs (aragorn, frodo) and shape-specific
  // sprites that don't belong in a generic-melee picker (bow,
  // crossbow, blowgun, dart). Artefact subfolder is also excluded
  // so authors don't accidentally pick a unique's bespoke art for a
  // common item. 2026-06-05.
  const invRoots = activeSlot.picker_roots || [];
  const ovRoots = activeSlot.overlay_roots || [];
  // Each entry stores the atlas-key (for the thumbnail URL) and the
  // basename that would land on the item. Only keep atlas keys that
  // resolve to a shipped file. Skip the filter when shippedTiles
  // hasn't loaded (e.g. running from local file:// without the
  // manifest available) so the picker still works in that fallback.
  const filterByShipped = shippedTiles.size > 0;
  allWeaponTiles = Object.keys(atlas)
    .filter(k => invRoots.some(r => k.startsWith(r)))
    .filter(k => !filterByShipped || shippedBasenameForAtlasKey(k) !== null)
    .sort();
  // Player overlays use bare stems (no subdir prefix). Filter against
  // shippedOverlays[<slot_dir>] to mirror what paperdoll_renderer
  // can actually render.
  const slotDir = (activeSlot.overlay_roots && activeSlot.overlay_roots[0] || '').replace('player/','').replace(/\/$/,'');
  const overlaySet = shippedOverlays[slotDir];
  allOverlayTiles = Object.keys(atlas)
    .filter(k => ovRoots.some(r => k.startsWith(r)))
    .filter(k => !k.includes('/artefact/'))
    .filter(k => _isGenericOverlay(activeSlot.id, k.split('/').pop().replace('.png', '')))
    .filter(k => !filterByShipped || !overlaySet || overlaySet.has(k.split('/').pop()))
    .sort();
}

function renderPickerFilterBar() {
  const bar = document.getElementById('picker-filter');
  bar.innerHTML = '';
  // Title hint — flips per pickerMode so the user knows whether they
  // are picking the inventory or paperdoll sprite.
  const title = document.querySelector('#picker-head strong');
  if (title) {
    title.textContent = pickerMode === 'overlay'
      ? 'Pick paperdoll sprite (how it looks on the bot)'
      : 'Pick inventory icon (how it looks in the bag)';
  }
  // Filter chips only apply to the inventory tree (which has hand-
  // tagged categories); the overlay tree is small and doesn't need
  // them — show a single "All" for clarity.
  if (pickerMode === 'overlay') {
    const btn = document.createElement('button');
    btn.textContent = 'All paperdoll sprites';
    btn.classList.add('active');
    bar.appendChild(btn);
    return;
  }
  const buttons = [{ key:'all', label:'All '+activeSlot.label }, ...(activeSlot.picker_extras || [])];
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.textContent = b.label;
    btn.onclick = () => setPickerCategory(b.key, btn);
    if (b.key === pickerCategory) btn.classList.add('active');
    bar.appendChild(btn);
  });
}

function setPickerCategory(cat, btn) {
  pickerCategory = cat;
  document.querySelectorAll('#picker-filter button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPicker();
}

// Picker thumbnail size — bigger sprites are essential for the
// overlay-mode picker where authors compare 32×32 silhouettes.
// Persisted to localStorage so the zoom level survives across reloads.
// 2026-06-05.
let pickerZoom = parseInt(localStorage.getItem('item_editor_picker_zoom') || '192', 10);
function _applyPickerZoom() {
  pickerZoom = Math.max(96, Math.min(480, pickerZoom));
  document.documentElement.style.setProperty('--pick-size', pickerZoom + 'px');
  const lbl = document.getElementById('picker-zoom-val');
  if (lbl) lbl.textContent = pickerZoom + 'px';
  localStorage.setItem('item_editor_picker_zoom', String(pickerZoom));
}
function adjustPickerZoom(delta) {
  pickerZoom += delta;
  _applyPickerZoom();
}
function onPickerWheel(ev) {
  // Ctrl+wheel = zoom; bare wheel = native scroll.
  if (!ev.ctrlKey && !ev.metaKey) return;
  ev.preventDefault();
  pickerZoom += (ev.deltaY < 0 ? 16 : -16);
  _applyPickerZoom();
}

function openPicker(id, mode) {
  pickerItemId = id;
  pickerMode = mode || 'inventory';
  if (!allWeaponTiles.length && !allOverlayTiles.length) buildWeaponTileList();
  pickerCategory = 'all';
  _applyPickerZoom();
  renderPickerFilterBar();
  document.getElementById('picker').classList.add('open');
  document.getElementById('picker-search').value = '';
  renderPicker();
}
function closePicker() { document.getElementById('picker').classList.remove('open'); }

function renderPicker() {
  const q = document.getElementById('picker-search').value.toLowerCase();
  const grid = document.getElementById('picker-grid');
  grid.innerHTML = '';

  let tiles = pickerMode === 'overlay' ? allOverlayTiles : allWeaponTiles;
  if (pickerMode !== 'overlay' && pickerCategory !== 'all') {
    const cfg = (activeSlot.picker_extras || []).find(e => e.key === pickerCategory);
    if (cfg) {
      if (cfg.path_includes) tiles = tiles.filter(k => k.includes(cfg.path_includes));
      else if (cfg.keywords) tiles = tiles.filter(k => cfg.keywords.some(kw => k.includes(kw)));
    }
  }
  if (q) tiles = tiles.filter(k => k.includes(q));

  tiles.slice(0,300).forEach(path => {
    const cell = document.createElement('div');
    cell.className = 'pick-cell';
    const shortName = path.split('/').pop().replace('.png','');
    // Picker thumbnails read from dcss/Full (the source-of-truth tree
    // with category subfolders). The CHOSEN value stored on the item
    // is the basename only, because items.json's `tile` and `overlay`
    // fields are basename-only (sync_items.py flattens DCSS into
    // assets/tiles/items/ and player/<slot>/ at build time).
    if (pickerMode === 'overlay') {
      // Layered preview: base bot sprite + the candidate overlay on
      // top, so authors see how the paperdoll WILL look without
      // needing to commit + reload. Same shape as the edit-panel
      // preview. 2026-06-05.
      cell.classList.add('layered');
      cell.innerHTML = `
        <div class="pick-img-wrap">
          <img class="layer" src="${BASE_SPRITE_URL}" alt="">
          <img class="layer" src="${tileUrlDcssFull(path)}"
               onerror="if(!this.dataset.s){this.dataset.s='1';this.src='${tileUrlDcssSupp(path)}'}else{this.style.display='none'}">
        </div>
        <div class="pick-name">${shortName}</div>
      `;
    } else {
      cell.innerHTML = `
        <img src="${tileUrlDcssFull(path)}" onerror="if(!this.dataset.s){this.dataset.s='1';this.src='${tileUrlDcssSupp(path)}'}else{this.parentElement.style.opacity='.3'}">
        <div class="pick-name">${shortName}</div>
      `;
    }
    cell.onclick = () => {
      const it = items.find(x=>x.id===pickerItemId);
      if (it) {
        if (pickerMode === 'overlay') {
          // Paperdoll overlay: store the bare stem (no .png) so it
          // matches paperdoll_renderer's `stem + ".png"` concatenation.
          const stem = path.split('/').pop().replace(/\.png$/, '');
          setOverlayField(pickerItemId, stem);
          const inp = document.getElementById('overlay-path-input');
          if (inp) inp.value = stem;
        } else {
          // Inventory icon: resolve to the basename that's actually
          // shipped under assets/tiles/items/. Some sprites
          // live in subdirs (artefacts/, spells/) and some artefact
          // weapons ship with a `wpn_` / `arm_` prefix that the DCSS
          // atlas doesn't carry. shippedBasenameForAtlasKey handles
          // all the variants. Falls back to the raw basename when the
          // shipped manifest hasn't loaded.
          const basename = shippedBasenameForAtlasKey(path) || path.split('/').pop();
          setField(pickerItemId, 'tile', basename);
          const inp = document.getElementById('tile-path-input');
          if (inp) inp.value = basename;
        }
        refreshSpritePreviews(pickerItemId);
      }
      closePicker();
    };
    grid.appendChild(cell);
  });
  if (!grid.children.length) grid.innerHTML = '<div style="color:var(--muted);padding:16px">No tiles match</div>';
}

// Set the per-item paperdoll overlay override. Empty string deletes
// the field so the resolver falls back to the inventory tile stem.
function setOverlayField(id, val) {
  const it = items.find(x => x.id === id);
  if (!it) return;
  const trimmed = String(val || '').trim();
  if (trimmed === '') {
    delete it.overlay;
  } else {
    it.overlay = trimmed;
  }
  dirty.add(id);
}

function clearOverlay(id) {
  setOverlayField(id, '');
  const inp = document.getElementById('overlay-path-input');
  if (inp) inp.value = '';
  refreshSpritePreviews(id);
}

// Re-resolve both preview <img> srcs from the live item state so an
// inventory or overlay change updates without a full panel rebuild.
// Picks up authored `default_tint` via the recolor preview filter
// already on the elements.
function refreshSpritePreviews(id) {
  const it = items.find(x => x.id === id);
  if (!it) return;
  const inv = document.getElementById('edit-sprite-img');
  if (inv) {
    inv.dataset.f = ''; inv.dataset.s = '';
    inv.src = tileUrl(it.tile || '');
    inv.style.display = '';
  }
  const ov = document.getElementById('edit-overlay-img');
  if (ov) {
    ov.style.opacity = '1';
    ov.title = '';
    ov.dataset.fallbackStep = '0';
    ov.dataset.invFallback = '';
    ov.src = overlayUrl(it);
  }
  // Card thumbnail in the grid.
  const cardImg = document.querySelector(`[data-id="${id}"] .sprite-wrap img`);
  if (cardImg) {
    cardImg.dataset.f = ''; cardImg.dataset.s = '';
    cardImg.src = tileUrl(it.tile || '');
    cardImg.style.display = '';
  }
}

// ---------- Export ----------
// Build the export payload for one item. Pre-fix this hand-listed an
// allowlist of fields, which silently dropped everything else
// (weapon damage_min/max/speed/damage_type/weapon_class, armor's
// armor/evasion, spells' spell_cooldown/primary_stat,
// requires_innate_tag, implicit_affixes, recolor_of, _balance_bumps).
// Now: start from the full loaded item dict (which IS the
// items.json shape — manifest sync mirrors items.json verbatim) and
// drop only legacy / always-zero noise. Any new schema field added
// to items.json automatically rides through.
function exportableItem(it) {
  const out = {};
  for (const k of Object.keys(it)) {
    const v = it[k];
    // Legacy v1 stats — items.json v2 has weapon damage_min/max +
    // armor/evasion instead. Drop atk/def/hp when zero so the export
    // doesn't carry stale zeroes the runtime ignores anyway.
    if ((k === 'atk' || k === 'def' || k === 'hp') && (!v || v === 0)) continue;
    // Empty containers — keep schema clean.
    if (Array.isArray(v) && v.length === 0 && k !== 'drop_weights' && k !== 'flavor_tags') continue;
    if (v && typeof v === 'object' && !Array.isArray(v) && Object.keys(v).length === 0) continue;
    // Tints with no mode are no-ops.
    if ((k === 'default_tint' || k === 'default_tint_overlay') && (!v || !v.mode || v.mode === 'none')) continue;
    out[k] = v;
  }
  // Ensure the canonical-order required keys exist even if the loaded
  // item is missing one — keeps every export entry shaped uniformly.
  if (!('flavor_tags' in out)) out.flavor_tags = [];
  if (!('drop_weights' in out)) out.drop_weights = [0,0,0,0,0];
  if (!('lore' in out)) out.lore = '';
  if (!('unique' in out)) out.unique = false;
  return out;
}

// Field-by-field merge of an imported entry into the in-memory item.
// The KEY rule: only OVERWRITE fields the import explicitly carries.
// Anything missing from the import (because the exporter dropped it,
// or the file is older than a schema bump) is left intact. This is
// the inverse of the prior bug where a round-trip Export→Import
// silently lost weapon stats / requires_innate_tag / implicit_affixes.
function mergeImportedItem(target, incoming) {
  for (const k of Object.keys(incoming)) {
    // Skip metadata that's not a real schema field.
    if (k.startsWith('_')) continue;
    // Skip legacy v1 zeroes (atk/def/hp); items.json v2 doesn't carry
    // them and the runtime ignores them.
    if ((k === 'atk' || k === 'def' || k === 'hp') && (!incoming[k])) continue;
    target[k] = incoming[k];
  }
  return target;
}

async function importJSON(event) {
  const file = event.target.files && event.target.files[0];
  // Reset the input so picking the same file twice still triggers change.
  event.target.value = '';
  if (!file) return;
  let parsed;
  try {
    const text = await file.text();
    parsed = JSON.parse(text);
  } catch (e) {
    setStatus('Import failed: ' + e.message, true);
    return;
  }
  // Two payload shapes are accepted:
  //   1. Bulk export — top-level has _slot + an items_<slot> array.
  //   2. Single-item snapshot — top-level IS the item dict (has id+slot).
  let importedItems = null;
  let importedSlot = null;
  if (Array.isArray(parsed)) {
    importedItems = parsed;
  } else if (parsed && typeof parsed === 'object') {
    if (parsed._slot) importedSlot = parsed._slot;
    // Find the array key — usually `items_<slot>`, but accept `items` too.
    for (const k of Object.keys(parsed)) {
      if (Array.isArray(parsed[k]) && parsed[k].length && parsed[k][0] && parsed[k][0].id) {
        importedItems = parsed[k];
        break;
      }
    }
    if (!importedItems && parsed.id && parsed.slot) {
      importedItems = [parsed];                    // single-item shape
      importedSlot = importedSlot || parsed.slot;
    }
  }
  if (!importedItems) {
    setStatus('Import failed: no items[] array or single-item dict found in JSON.', true);
    return;
  }
  // Slot-mismatch guard. The active slot's `items[]` is what we'll
  // mutate; refuse to import a different slot's payload silently.
  if (importedSlot && importedSlot !== activeSlot.id) {
    if (!confirm(`Import file targets slot "${importedSlot}" but active slot is "${activeSlot.id}". Switch tabs first, or click OK to import anyway (only matching-slot items will land).`)) {
      return;
    }
  }
  // Diff: classify each imported entry as new / changed / unchanged.
  const byId = new Map(items.map(x => [x.id, x]));
  const planned = {new: [], changed: [], unchanged: [], wrongSlot: []};
  for (const inc of importedItems) {
    if (!inc || !inc.id) continue;
    if (inc.slot && inc.slot !== activeSlot.id) {
      planned.wrongSlot.push(inc.id);
      continue;
    }
    const cur = byId.get(inc.id);
    if (!cur) {
      planned.new.push(inc);
    } else {
      // Test: would the merge actually change any field?
      const probe = JSON.parse(JSON.stringify(cur));
      mergeImportedItem(probe, inc);
      if (JSON.stringify(probe) !== JSON.stringify(cur)) {
        planned.changed.push({inc, cur});
      } else {
        planned.unchanged.push(inc.id);
      }
    }
  }
  // Confirm before applying. Skip the prompt when there's nothing to do.
  const total = planned.new.length + planned.changed.length;
  if (total === 0) {
    setStatus(`Import: no changes (${planned.unchanged.length} unchanged, ${planned.wrongSlot.length} wrong-slot).`);
    setTimeout(() => setStatus(''), 4000);
    return;
  }
  const summary = [
    `${planned.new.length} new item(s)`,
    `${planned.changed.length} changed item(s)`,
    `${planned.unchanged.length} unchanged`,
    planned.wrongSlot.length ? `${planned.wrongSlot.length} skipped (wrong slot)` : null,
  ].filter(Boolean).join(', ');
  if (!confirm(`Import "${file.name}":\n\n${summary}\n\nApply now?`)) {
    setStatus('Import cancelled.');
    setTimeout(() => setStatus(''), 2400);
    return;
  }
  // Apply.
  for (const inc of planned.new) {
    // Strip metadata keys (_balance_bumps etc are real schema; _note isn't).
    const fresh = {};
    mergeImportedItem(fresh, inc);
    items.push(fresh);
    dirty.add(inc.id);
  }
  for (const {inc, cur} of planned.changed) {
    mergeImportedItem(cur, inc);
    dirty.add(inc.id);
  }
  // Re-cache the per-slot state so a tab switch + back doesn't blow
  // the imported edits away. Same shape switchSlot uses.
  if (slotState[activeSlot.id]) {
    slotState[activeSlot.id] = {manifest, items, dirty: new Set(dirty)};
  }
  closeEdit();
  renderSidebar();
  renderGrid();
  updateSlotCount(activeSlot.id, items.length);
  setStatus(`Imported "${file.name}" — ${summary}. Hit ⬇ Export to write items.json.`);
  setTimeout(() => setStatus(''), 6000);
}

function exportJSON() {
  // Build items.json-compatible slice for the active slot.
  const slot = activeSlot;
  const out = {
    "_note": "Auto-generated by item_editor.html. Merge into data/items.json (the items[] array).",
    "_generated": new Date().toISOString(),
    "_slot": slot.id,
    [slot.export_key]: items.map(exportableItem),
  };

  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = slot.export_file;
  a.click();
  dirty.clear();
  setStatus('Saved '+slot.export_file+' — share to submit, or drop into the game files.');
  setTimeout(() => setStatus(''), 4000);
  renderSidebar();
  renderGrid();
}

// One-item snapshot — the same shape items.json's items[] entries
// have, so a reviewer can paste it straight into the array. Used by
// the share-back loop where someone authors ONE item and posts it.
function singleItemPayload(it) {
  // Reuse the shared exporter so single-item payloads carry the same
  // schema-preserving fields as the bulk export.
  const payload = exportableItem(it);
  // Make sure slot is filled in — single-item payloads are sometimes
  // pasted into items.json by hand.
  if (!payload.slot) payload.slot = activeSlot.id;
  // Legacy callers expected explicit zeros for atk/def/hp on the
  // share-back snapshot. Nothing reads them anymore; keeping the
  // payload clean.
  return payload;
}

// Removed: hand-listed export allowlist that silently dropped
// weapon stats / armor stats / spell stats / requires_innate_tag /
// implicit_affixes / recolor_of. exportableItem() above replaces it.

function exportSingleItem() {
  if (!selectedId) return;
  const it = items.find(x => x.id === selectedId);
  if (!it) return;
  const json = JSON.stringify(singleItemPayload(it), null, 2) + '\n';
  const blob = new Blob([json], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `item_${it.id}.json`;
  a.click();
  setStatus('Exported item_'+it.id+'.json');
  setTimeout(() => setStatus(''), 2400);
}

async function copySingleItemToClipboard() {
  if (!selectedId) return;
  const it = items.find(x => x.id === selectedId);
  if (!it) return;
  const json = JSON.stringify(singleItemPayload(it), null, 2) + '\n';
  try {
    await navigator.clipboard.writeText(json);
    setStatus('Copied "'+it.id+'" JSON to clipboard.');
    setTimeout(() => setStatus(''), 2400);
  } catch (e) {
    setStatus('Clipboard write blocked — use ⬇ Export instead.', true);
    setTimeout(() => setStatus(''), 3500);
  }
}

// ---------- Drop weight visualiser legend ----------
function renderDropLegend() {
  // Shown in topbar
  const legend = TIER_COLORS.slice(1).map((c,i) =>
    `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--muted)">
      <span style="width:10px;height:10px;border-radius:50%;background:${c};display:inline-block"></span>T${i+1}
    </span>`
  ).join(' ');
  const el = document.createElement('div');
  el.style = 'display:flex;gap:6px;align-items:center;font-size:11px;color:var(--muted)';
  el.innerHTML = 'Drop bar: ' + legend;
  document.getElementById('topbar').insertBefore(el, document.getElementById('topbar').querySelector('.spacer'));
}

init().then(renderDropLegend);
</script>
